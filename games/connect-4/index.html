<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect 4</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="panel">
        <p class="eyebrow">Head-To-Head</p>
        <h1>Connect 4</h1>
        <p class="summary">Drop discs, build a line of four, and steal the next turn if you can.</p>
        <p class="status" id="status">Red opens the match.</p>
        <button class="action" id="reset-button" type="button">Restart Match</button>
      </section>

      <section class="board-panel">
        <div class="column-controls" id="column-controls" aria-label="Choose a column"></div>
        <div class="board" id="board" aria-label="Connect 4 board"></div>
      </section>
    </main>
  </body>
</html>
